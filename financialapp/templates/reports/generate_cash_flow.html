{% extends 'general/base.html' %}
{% load humanize %}
{% load mathfilters %}

{% block title %}Generate Cash Flow Statement - Financial App{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h4 class="card-title mb-0">
                    <i class="fas fa-money-bill-wave me-2"></i>Generate Cash Flow Statement
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <!-- Similar structure with period selection -->
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Start Date</label>
                                <input type="date" name="start_date" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">End Date</label>
                                <input type="date" name="end_date" class="form-control" required>
                            </div>
                        </div>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'financialapp:financial_reports' %}" class="btn btn-secondary me-md-2">Cancel</a>
                        <button type="submit" class="btn btn-info">Generate Report</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
